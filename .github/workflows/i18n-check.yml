name: i18n Check

on:
  push:
    branches: [main]
    paths:
      - "public/locales/**"
      - "src/**/*.tsx"
      - "src/**/*.ts"
      - "scripts/check-i18n.js"
  pull_request:
    paths:
      - "public/locales/**"
      - "src/**/*.tsx"
      - "src/**/*.ts"
      - "scripts/check-i18n.js"
      - "scripts/check-i18n-components.js"

jobs:
  check-translations:
    name: Check translation key consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check translation key consistency (locale vs locale)
        run: npm run i18n:check

      - name: Check translation keys used in components
        run: npm run i18n:check:components

      - name: Check i18n:sync is up to date
        run: |
          npm run i18n:sync
          git diff --exit-code public/locales/ || (echo "::error::Run \`npm run i18n:sync\` and commit the result." && exit 1)

      - name: Warn on untranslated values
        continue-on-error: true
        run: |
          matches=$(grep -r "\[MISSING_TRANSLATION" public/locales/ --include="*.json" || true)
          if [ -n "$matches" ]; then
            echo "::warning::Untranslated values found. Run \`npm run i18n:missing\` for details."
            echo "$matches"
          fi
