name: Bundle Size Check

on:
  pull_request:
    paths:
      - "src/**"
      - "vite.config.ts"
      - "package.json"

jobs:
  size:
    name: Check bundle size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run size
